<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AISmokeShaqStudio – Studio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>

<body class="dn-body">
  <header class="dn-header">
    <div class="dn-logo-wrap">
      <img src="assets/logo.png" class="dn-logo" alt="Logo" />
      <div class="dn-logo-text">
        <span class="dn-logo-title">AISmokeShaqStudio</span>
        <span class="dn-logo-sub">Creator‑Built AI Studio</span>
      </div>
    </div>
    <nav class="dn-nav">
      <a href="index.html" class="dn-nav-link">Home</a>
      <a href="lipsync.html" class="dn-nav-link">Lipsync Timeline</a>
    </nav>
  </header>

  <main class="dn-studio">
    <section class="dn-panel dn-panel-left">
      <h2 class="dn-panel-title">AI Generation Tools</h2>

      <!-- MODE SELECT -->
      <label class="dn-label">Mode</label>
      <select id="modeSelect" class="dn-select">
        <option value="text2img">Text → Image</option>
        <option value="img2img">Image → Image</option>
        <option value="img2video">Image → Video</option>
        <option value="video2video">Video → Video</option>
        <option value="lipsync_upload_audio">Lipsync (Upload Audio)</option>
        <option value="lipsync_tts">Lipsync (Generate Voice)</option>
        <option value="tts_only">Text → Voice (TTS)</option>
      </select>

      <!-- MODEL SELECT -->
      <label class="dn-label">Model / Engine</label>
      <select id="modelSelect" class="dn-select">
        <option value="default">Default Engine</option>
        <option value="sdxl">SDXL</option>
        <option value="i2v">Image → Video Engine</option>
        <option value="lipsync">Lipsync Engine</option>
      </select>

      <!-- PROMPT -->
      <label class="dn-label">Prompt</label>
      <textarea id="promptInput" class="dn-textarea" placeholder="Describe your scene..."></textarea>

      <!-- SCRIPT / DIALOG -->
      <div id="panelScript" class="dn-hidden">
        <label class="dn-label">Dialog / Script</label>
        <textarea id="scriptInput" class="dn-textarea" placeholder="Character dialog here..."></textarea>
      </div>

      <!-- VOICE SELECT -->
      <div id="panelVoice" class="dn-hidden">
        <label class="dn-label">Voice</label>
        <select id="voiceSelect" class="dn-select"></select>
      </div>

      <!-- IMAGE UPLOAD -->
      <div id="panelImage" class="dn-hidden">
        <label class="dn-label">Upload Image</label>
        <input type="file" id="imageInput" class="dn-file" accept="image/*" />
      </div>

      <!-- VIDEO UPLOAD -->
      <div id="panelVideo" class="dn-hidden">
        <label class="dn-label">Upload Video</label>
        <input type="file" id="videoInput" class="dn-file" accept="video/*" />
      </div>

      <!-- AUDIO UPLOAD -->
      <div id="panelAudio" class="dn-hidden">
        <label class="dn-label">Upload Audio</label>
        <input type="file" id="audioInput" class="dn-file" accept="audio/*" />
      </div>

      <!-- GENERATE BUTTON -->
      <button id="generateBtn" class="dn-btn dn-btn-primary dn-generate-btn">
        Generate
      </button>

      <!-- STATUS -->
      <div id="statusMessage" class="dn-status"></div>

      <!-- CREDITS -->
      <div class="dn-credits">
        Credits: <span id="creditsDisplay">--</span>
      </div>
    </section>

    <section class="dn-panel dn-panel-right">
      <h2 class="dn-panel-title">Output</h2>
      <div id="outputContainer" class="dn-output"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
